
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles_inscription.css') }}">

</head>
<body>
    <header>
        <h1>Fleuropa</h1>
        <h2>Fleuriste depuis 1980</h2>

    </header>
    <nav>
        <a href="{{ url_for('accueil') }}">Accueil</a> -
        <a href="{{ url_for('bouquets') }}">Bouquets</a> -
        <a href="{{ url_for('magasins') }}">Nos magasins</a>
    </nav>
    <div class="container">
        <h1>Inscription</h1>
        <form action="{{ url_for('inscription') }}" method="post">
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" value="{{ nom if nom else '' }}" required>
            </div>
            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" value="{{ prenom if prenom else '' }}" required>
            </div>
            <div class="form-group">
                <label for="sexe">Sexe :</label>
                <select id="sexe" name="sexe" required>
                    <option value="Homme" {% if sexe == "Homme" %}selected{% endif %}>Homme</option>
                    <option value="Femme" {% if sexe == "Femme" %}selected{% endif %}>Femme</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mdp">Mot de passe :</label>
                <input type="password" id="mdp" name="mdp" value="{{ mdp if mdp else '' }}" required>
            </div>
            <div class="form-group">
                <label for="adresse">Adresse :</label>
                <textarea id="adresse" name="adresse" required>{{ adresse if adresse else '' }}</textarea>
            </div>
            <div class="form-group">
                <label for="adressemail">Adresse e-mail :</label>
                <textarea id="adressemail" name="adressemail" required>{{ adressemail if adressemail else '' }}</textarea>
            </div>
            {% if erreur %}
                <p class="error-message">{{ erreur }}</p>
            {% endif %}
            <div class="form-group">
                <input type="submit" value="S'inscrire">
            </div>
            
        </form>
    </div>
</body>
</html>
