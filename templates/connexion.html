<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles_connexion.css') }}">
</head>
<body>
    <header>
        <h1>Fleuropa</h1>
        <h2>Fleuriste depuis 1980</h2>
    </header>
    <nav>
        <a href="{{ url_for('accueil') }}">Accueil</a>
        <a href="{{ url_for('bouquets') }}">Bouquets</a>
        {% if 'numcli' in session %}
            <a href="{{ url_for('deconnexion') }}">Déconnexion</a>
        {% else %}
            <a href="{{ url_for('connexion') }}">Connexion</a>
            <a href="{{ url_for('inscription') }}">Inscription au club</a>
        {% endif %}
        <a href="{{ url_for('consulter_commande') }}">Suivre votre commande</a>
    </nav>
    <div class="container">
        <h1>Connexion</h1>
        <form action="{{ url_for('connexion') }}" method="post">
            <div class="form-group">
                <label for="numcli">Numéro de client :</label>
                <input type="text" id="numcli" name="numcli" required>
            </div>
            <div class="form-group">
                <label for="mdp">Mot de passe :</label>
                <input type="password" id="mdp" name="mdp" required>
            </div>
            {% if erreur %}
                <p class="error-message">{{ erreur }}</p>
            {% endif %}
            <div class="form-group">
                <input type="submit" value="Se connecter">
            </div>
            
        </form>
    </div>
</body>
</html>
